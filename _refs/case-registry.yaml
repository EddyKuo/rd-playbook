    隔離、Builder 模式與固定隨機種子的實踐。技術棧:TypeScript / Vitest /
    Prisma / PostgreSQL 17 / Docker Compose。
- id: CASE-FIN-011
  title: ClearFund 轉帳手續費計算模組的脆弱測試危機
  domain: fin
  chapters:
  - ch-11
  summary: |
    ClearFund 是一家虛構的金融科技公司,提供企業轉帳清算服務。
    工程師小佳負責手續費計算模組,擁有四十幾支單元測試且全數通過 CI。
    上線後發現特定費率組合(企業戶且當日累積超門檻)計算錯誤,客戶被多收費。
    根因有二:一是測試只覆蓋單一費率規則,未覆蓋「費率疊加」的組合場景;
    二是大量測試驗私有方法呼叫(耦合實作細節),每次重構就觸發大量假警報,
    破壞了工程師對測試的信任。用於說明:測試數量不等於覆蓋品質;
    「測行為」而非「測實作」是讓測試真正撐住你的關鍵。
- id: CASE-FIN-013
  title: ClearPay 交易授權服務的測試替身漂移事件
  domain: fin
  chapters:
  - ch-13
  summary: |
    ClearPay 是一家虛構支付公司,其交易授權服務對接外部風控 API(RiskEvaluation API)。
    工程師小雅將外部風控 API 完整 mock 後跑出全綠的 CI,但 mock 格式已落後真實 API
    三個月——對方新增的 risk_code 欄位導致授權邏輯判斷有誤。事件揭示「Mock 漂移」的
    風險,以及搭配契約測試(Pact)保護外部依賴替身的必要性。授權服務有三個依賴:外部
    風控 API(Mock + 契約測試)、內部 TransactionRepository(Fake in-memory)、
    EventPublisher(Spy)——三種依賴用三種不同替身,說明「因材選替身」的判斷框架。
    公司名、數字皆為虛構;Mock 漂移機制與契約測試方法論為真實可驗證的工程實踐。
- id: CASE-FIN-012
  title: ClearPay 支付閘道與帳戶服務的 Pact 契約測試
  domain: fin
  chapters:
  - ch-12
  summary: |
    ClearPay 是一家虛構的台灣金融科技公司,旗下有兩個微服務:負責清算的支付
    閘道服務(Payment Gateway,消費者)和負責帳戶餘額的帳戶服務(Account Service,
    提供者)。Account Service 工程師將欄位 userId 改名為 user_id,Swagger 文件
    未同步,Payment Gateway 的 mock 沿用舊欄位名稱,整合環境部署後頁面白屏。
    引入 Pact 消費者驅動契約測試後,同樣的欄位改動在提供者 CI 的 Provider
    Verification 步驟即被攔截,不再需要等待整合環境部署後才能發現問題。
    搭配 Webhook 與 can-i-deploy,使契約治理機制成為 CI 流程的一部分。
- id: CASE-HCR-005
  title: Lumivita Health 病患風險評分函式重構
  domain: hcr
  chapters:
  - ch-05
  summary: |
    Lumivita Health 電子病歷系統的風險等級計算函式(evaluate_patient_risk),
    最初以單字母縮寫命名參數(p['b'], p['c'], t, v)並混合加權計算與分類邏輯於同一函式。
    三個月後接手工程師需花費半天逆向推理業務語意,且無法確認臨床係數來源。
    本案例用於說明命名、結構、注釋三層次可讀性改善與「可讀性自查卡」的應用。
    技術細節:Python 3.12,標準函式庫,無外部依賴。
- id: CASE-HCR-010
  title: CareLink 病患風險評分模組可測試性重構
  domain: hcr
  chapters:
  - ch-10
  summary: |
    CareLink 是一家 HIS(醫院資訊系統)公司。工程師小雯實作病患風險評分模組時,
    將資料庫查詢、全域設定讀取、系統時間取得全部耦合在單一函式內(calculate_risk_score),
    導致想補單元測試時需要架設完整環境,耗時一小時仍無法下手。
    重構後將純計算邏輯抽成 compute_risk_score() 純函式、
    透過依賴注入替換 PatientRepository 抽象介面與時鐘依賴(clock callable),
    使得 12 個測試案例在 30 分鐘內完成,且無需連接真實資料庫。
    本案例用於說明純函式、依賴注入、邊界隔離三種提升可測試性的設計手法。
- id: CASE-ECM-002
  title: 佳捷商城 Checkout Team 分支策略重整
  domain: ecm
  chapters:
  - ch-04
  summary: |
    虛構電商平台佳捷商城的七人 Checkout Team,在一次七條 feature branch 同時
    合入 main 的整合事件中,因分支壽命過長(各自活了兩週)、commit 訊息混沌
    (大量「fix bug」「update」「WIP」),導致大量 merge 衝突與測試紅燈,工程師
