# RD Playbook 案例註冊表
# 所有章節引用的虛構案例集中於此。公司名、數字皆虛構,技術細節須真實可驗證。
# 命名:CASE-{DOMAIN}-NNN,DOMAIN 為 FIN/ECM/HCR/SAS/ENR

cases:
  - id: CASE-SAS-001
    title: "Brightdesk 的『看起來沒問題』功能"
    domain: saas
    chapters: [ch-01]
    summary: |
      Brightdesk 是一個多租戶客服 SaaS。一位年輕工程師用 AI 助手快速生出
      一支「批次匯出工單」功能,本機測試與 demo 都正常,順利上線。三天後,
      某個大租戶匯出時拖垮了資料庫——AI 生成的查詢在單一租戶資料量大時
      會一次撈全表(缺少分頁與租戶層級的索引使用)。功能「能跑」,但沒有人
      在交付前問過「它在最大的租戶身上會怎樣」。用於說明:AI 讓「產出」變快,
      於是「判斷」成為新的瓶頸與價值所在。
