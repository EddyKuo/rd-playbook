    body 必填)、branch protection rules,整合問題得到顯著改善。本案例用於說明
    分支壽命與整合複雜度的因果關係,以及 commit 訊息衛生對可追查性的影響。
- id: CASE-SAS-007
  title: Nexthread 多租戶授權複雜度失控
  domain: sas
  chapters:
  - ch-07
  summary: |
    Nexthread 是一家虛構的多租戶 SaaS 公司,提供客服與協作工具。
    其計費與權限模組的 can_access_feature 函式,因為多次迭代疊加方案條件
    (Starter / Pro / Enterprise 三種方案 × admin/member 兩種 role × 多個
    feature 屬性),圈複雜度累積到約 13,導致工程師小雅修復 bug 時反覆引入
    新的迴歸問題。本案例用於說明條件巢狀、狀態爆炸與圈複雜度的實際影響,
