    策略的應用,以及「先補測試、再重構」的安全動手順序。
- id: CASE-SAS-016
  title: Kova SaaS 帳單計算模組 Code Review 事件
  domain: sas
  chapters:
  - ch-16
  summary: |
    Kova 是一家多租戶 SaaS 計費平台。工程師小琪提交帳單計算模組 PR-247,
