    於是「判斷」成為新的瓶頸與價值所在。
- id: CASE-ECM-001
  title: CartHub 活動結算服務折扣雙重計算事件
  domain: ecm
  chapters:
  - ch-02
  summary: |
    虛構電商平台 CartHub 的活動結算服務存在折扣金額算錯的 bug。
    根因是 applyDiscount 被呼叫兩次:一次在 controller 層,一次在
    saveSettlement 內部。兩次呼叫之間 deductInventory 改變了庫存
    狀態,導致依賴庫存數量的折扣條件式產生不一致的結果。
    本案例用於示範「追資料流」方法如何幫助工程師在不讀完全部細節
    的情況下,定位到問題所在的函式呼叫位置。
- id: CASE-ECM-014
  title: Cartly 商品評論功能測試環境污染事件
  domain: ecm
  chapters:
  - ch-14
  summary: |
    Cartly 是一家虛構的線上購物平台。工程師小燕為商品評論功能補寫整合測試,
